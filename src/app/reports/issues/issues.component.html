<section class="report-page">
  <div class="report-header">
    <div>
      <!-- <p class="eyebrow">Embedded report</p> -->
      <h2>Maintenance Live View</h2>
    </div>
  </div>

  <div class="report-panel">
    <div class="report-meta">
      <span>Maintenance report</span>
    </div>
    <div class="iframe-shell">
      <div *ngIf="loading" class="embed-loading">Loading Power BI report...</div>
      <div *ngIf="error" class="embed-error">{{ error }}</div>
      <div #embedContainer class="powerbi-embed-container"></div>
    </div>
  </div>
</section>
