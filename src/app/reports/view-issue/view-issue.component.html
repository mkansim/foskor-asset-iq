<section class="view-issue-page" *ngIf="issue">
  <div class="page-header">
    <div>
      <p class="eyebrow">View maintenance issue</p>
      <h2>Issue details</h2>
    </div>
    <p class="page-copy">This form is read-only and shows the details for the selected maintenance issue.</p>
  </div>

  <form>
    <fieldset disabled class="form-grid">
      <div class="form-card">
        <label for="section">Section</label>
        <input id="section" type="text" [ngModel]="issue.section" name="section" />

        <label for="equipment">Equipment</label>
        <input id="equipment" type="text" [ngModel]="issue.equipment" name="equipment" />

        <label for="problemIssue">Problem / Issue</label>
        <textarea id="problemIssue" rows="4" [ngModel]="issue.problemIssue" name="problemIssue"></textarea>

        <label for="source">Source</label>
        <input id="source" type="text" [ngModel]="issue.source" name="source" />

        <label for="cause">Cause</label>
        <textarea id="cause" rows="3" [ngModel]="issue.cause" name="cause"></textarea>

        <label for="action">Action</label>
        <textarea id="action" rows="3" [ngModel]="issue.action" name="action"></textarea>
      </div>

      <div class="form-card">
        <label for="criticality">Criticality</label>
        <input id="criticality" type="text" [ngModel]="issue.criticality" name="criticality" />

        <label for="responsiblePerson">Responsible Person</label>
        <input id="responsiblePerson" type="text" [ngModel]="issue.responsiblePerson" name="responsiblePerson" />

        <label for="dueDate">Due Date</label>
        <input id="dueDate" type="date" [ngModel]="issue.dueDate | date:'yyyy-MM-dd'" name="dueDate" />

        <label class="checkbox-row">
          <input id="totalPlantStoppageRequired" type="checkbox" [ngModel]="issue.totalPlantStoppageRequired" name="totalPlantStoppageRequired" />
          Total plant stoppage required
        </label>

        <label for="timeRequiredHours">Time Required (hours)</label>
        <input id="timeRequiredHours" type="number" step="0.25" min="0" [ngModel]="issue.timeRequiredHours" name="timeRequiredHours" />

        <label for="status">Status</label>
        <input id="status" type="text" [ngModel]="issue.status" name="status" />

        <label for="comments">Comments</label>
        <textarea id="comments" rows="4" [ngModel]="issue.comments" name="comments"></textarea>
      </div>
    </fieldset>
  </form>

  <div class="form-actions">
    <button class="secondary-button" type="button" (click)="goBack()">Back to issues</button>
  </div>
</section>
